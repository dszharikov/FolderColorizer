name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Test
        run: dotnet test FolderColorizer.slnx --configuration Release

      - name: Publish application
        run: >
          dotnet publish src/FolderColorizer/FolderColorizer.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          --output artifacts/publish
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:DebugType=None
          -p:PublishTrimmed=false

      - name: Build installer
        shell: powershell
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          & $iscc installer\FolderColorizer.iss

      - name: Upload installer
        uses: actions/upload-artifact@v7
        with:
          name: FolderColorizer-Setup
          path: artifacts/installer/*.exe
          if-no-files-found: error

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $installer = Get-ChildItem artifacts\installer\*.exe |
            Select-Object -ExpandProperty FullName
          gh release create $env:GITHUB_REF_NAME $installer --generate-notes
